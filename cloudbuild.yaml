steps:
  # Stage 1: Pull cached base image (silent fail on first run)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/agent-base:latest || true']

  # Stage 1: Build base image with all heavy deps
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from=gcr.io/$PROJECT_ID/agent-base:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/agent-base:latest'
      - '-f'
      - 'Dockerfile.base'
      - '.'

  # Stage 2: Build app image on top of base
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=BASE_IMAGE=gcr.io/$PROJECT_ID/agent-base:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/agent-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/agent-backend:latest'
      - '.'

  # Stage 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=gcr.io/$PROJECT_ID/agent-backend:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--memory=2Gi'
      - '--cpu=1'

# Let Cloud Build push images using its own service account (avoids permission issues)
images:
  - 'gcr.io/$PROJECT_ID/agent-base:latest'
  - 'gcr.io/$PROJECT_ID/agent-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/agent-backend:latest'

substitutions:
  _SERVICE_NAME: agent-backend
  _REGION: us-central1

timeout: '3600s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
