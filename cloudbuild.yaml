steps:
  # Pull the previously cached image (fails silently on first build)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull $_CACHE_IMAGE_URI || true'

  # Build using the cached layer as a starting point
  # Docker reuses any layer whose inputs haven't changed (e.g. requirements.txt)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from=$_CACHE_IMAGE_URI'
      - '-t'
      - '$_IMAGE_URI'
      - '-t'
      - '$_CACHE_IMAGE_URI'
      - '.'

  # Push the commit-tagged image used by Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_IMAGE_URI'

  # Push the `latest` tag so the next build can reuse it as cache
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_CACHE_IMAGE_URI'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_IMAGE_URI'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--memory=2Gi'
      - '--cpu=1'

substitutions:
  _SERVICE_NAME: agent-backend
  _REGION: us-central1
  _IMAGE_URI: gcr.io/$PROJECT_ID/agent-backend:$COMMIT_SHA
  # `latest` is used as the layer cache source for every build
  _CACHE_IMAGE_URI: gcr.io/$PROJECT_ID/agent-backend:latest

# 30-minute timeout for the first (cold) build; subsequent builds will be ~5 min
timeout: '1800s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
