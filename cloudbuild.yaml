steps:
  # Stage 1: Pull cached base image (silent fail on first run)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/agent-base:latest || true']

  # Stage 1: Build base image with all heavy deps
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from=gcr.io/$PROJECT_ID/agent-base:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/agent-base:latest'
      - '-f'
      - 'Dockerfile.base'
      - '.'

  # Stage 2: Build app image on top of base
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=BASE_IMAGE=gcr.io/$PROJECT_ID/agent-base:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/agent-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/agent-backend:latest'
      - '.'

  # Configure Docker credentials using gcloud (writes to /root/.docker/config.json)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args: ['-c', 'gcloud auth configure-docker gcr.io --quiet']
    volumes:
      - name: 'docker-config'
        path: '/root/.docker'

  # Push all images using the configured credentials
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker push gcr.io/$PROJECT_ID/agent-base:latest
        docker push gcr.io/$PROJECT_ID/agent-backend:$COMMIT_SHA
        docker push gcr.io/$PROJECT_ID/agent-backend:latest
    volumes:
      - name: 'docker-config'
        path: '/root/.docker'

timeout: '3600s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
