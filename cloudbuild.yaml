steps:
  # ── Stage 1: Base image (heavy deps — pip install) ────────────────────────
  # Pull the cached base image so Docker can reuse its layers
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull $_BASE_IMAGE_URI || true']

  # Build the base image — try with cache first, fall back to clean build
  # (fallback needed on first run when no cache image exists yet)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build --cache-from=$_BASE_IMAGE_URI -t $_BASE_IMAGE_URI -f Dockerfile.base . \
        || docker build -t $_BASE_IMAGE_URI -f Dockerfile.base .

  # Push base image so the next build can pull it as cache
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_BASE_IMAGE_URI']

  # ── Stage 2: App image (just COPY . . — always fast) ─────────────────────
  # Build the final image on top of the pre-built base
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=BASE_IMAGE=$_BASE_IMAGE_URI'
      - '-t'
      - '$_IMAGE_URI'
      - '.'

  # Push the commit-tagged image used by Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE_URI']

  # ── Stage 3: Deploy ───────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_IMAGE_URI'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--memory=2Gi'
      - '--cpu=1'

substitutions:
  _SERVICE_NAME: agent-backend
  _REGION: us-central1
  _IMAGE_URI: gcr.io/$PROJECT_ID/agent-backend:$COMMIT_SHA
  # Base image stores all pip-installed deps — rebuilt only when requirements.txt changes
  _BASE_IMAGE_URI: gcr.io/$PROJECT_ID/agent-base:latest

# 60 min for the one-time base build; every build after that is ~3-5 min
timeout: '3600s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
