steps:
  # Build image
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "asia-south1-docker.pkg.dev/$PROJECT_ID/eleven-repo/eleven-backend:$COMMIT_SHA",
        "."
      ]

  # Push image
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "asia-south1-docker.pkg.dev/$PROJECT_ID/eleven-repo/eleven-backend:$COMMIT_SHA"
      ]

  # Deploy to Cloud Run (still Cloud Build, NOT your CLI)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "eleven-backend",
        "--image",
        "asia-south1-docker.pkg.dev/$PROJECT_ID/eleven-repo/eleven-backend:$COMMIT_SHA",
        "--region",
        "asia-south1",
        "--platform",
        "managed",
        "--allow-unauthenticated"
      ]

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/eleven-repo/eleven-backend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
