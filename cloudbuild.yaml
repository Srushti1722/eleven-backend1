steps:
  # Stage 1: Base image (heavy deps - pip install)
  # Pull cached base image - silent fail on first run (image does not exist yet)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/agent-base:latest || true']

  # Build base image - uses cache if available, clean build on first run
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from=gcr.io/$PROJECT_ID/agent-base:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/agent-base:latest'
      - '-f'
      - 'Dockerfile.base'
      - '.'

  # Push base image so next build can use it as cache
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/agent-base:latest']

  # Stage 2: App image - just COPY . . on top of base (~30 sec)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=BASE_IMAGE=gcr.io/$PROJECT_ID/agent-base:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/agent-backend:$COMMIT_SHA'
      - '.'

  # Push the commit-tagged image used by Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/agent-backend:$COMMIT_SHA']

  # Stage 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=gcr.io/$PROJECT_ID/agent-backend:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--memory=2Gi'
      - '--cpu=1'

substitutions:
  _SERVICE_NAME: agent-backend
  _REGION: us-central1

# 60 min for the first cold base build; every subsequent build is ~3-5 min
timeout: '3600s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
