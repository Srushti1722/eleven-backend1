steps:
  # Create Artifact Registry repo if it does not exist yet
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud artifacts repositories create agent-repo \
          --repository-format=docker \
          --location=asia-south1 \
          --quiet || true

  # Pull cached base image (silent fail on first run)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull asia-south1-docker.pkg.dev/$PROJECT_ID/agent-repo/agent-base:latest || true']

  # Build base image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from=asia-south1-docker.pkg.dev/$PROJECT_ID/agent-repo/agent-base:latest'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/agent-repo/agent-base:latest'
      - '-f'
      - 'Dockerfile.base'
      - '.'

  # Build app image on top of base
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=BASE_IMAGE=asia-south1-docker.pkg.dev/$PROJECT_ID/agent-repo/agent-base:latest'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/agent-repo/agent-backend:$COMMIT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/agent-repo/agent-backend:latest'
      - '.'

  # Push all images inside the build step (uses pre-authenticated Cloud Build credentials)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker push asia-south1-docker.pkg.dev/$PROJECT_ID/agent-repo/agent-base:latest
        docker push asia-south1-docker.pkg.dev/$PROJECT_ID/agent-repo/agent-backend:$COMMIT_SHA
        docker push asia-south1-docker.pkg.dev/$PROJECT_ID/agent-repo/agent-backend:latest

timeout: '3600s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: NONE
